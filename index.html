<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Día de la Mujer</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <div class="card">
    <div class="card-inner"></div>
    <div class="ribbon">
      <span class="ribbon-content">8 de Marzo</span>
    </div>
    <div class="card-content">
      <h1 class="title" id="title"></h1>
      <div class="message-container">
        <p class="message" id="message">Haz clic en el botón para ver un mensaje especial para ti.</p>
      </div>
      <button class="btn" id="phraseBtn">Mensaje para ti</button>
    </div>
  </div>

  <script src='script.js'></script>
</body>
</html>
